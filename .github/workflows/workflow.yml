name: Build and deploy ahun-bff
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java-21
        uses: actions/setup-java@4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with gradle
        run: ./gradlew clean bootJar

      - name: Login with GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build da imagem Docker
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Push da imagem
        run: docker push ${{ env.IMAGE_NAME }}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configurar kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy para o Kubernetes
        run: kubectl apply -f deployment/